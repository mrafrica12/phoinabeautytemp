  <div class="admin-overlay" id="adminOverlay"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:.75rem;">
        <button class="admin-menu-toggle" id="adminMenuToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="admin-topbar-title"><h1>Staff Manager</h1><p>Manage your team profiles and departments</p></div>
      </div>
      <div class="admin-topbar-actions">
        <a href="schedule.html" class="btn-admin-outline">View Schedule</a>
        <button class="btn-admin-gold" onclick="openModal('staffModal')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Staff
        </button>
      </div>
    </div>

    <div class="admin-content">

      <!-- Filter bar -->
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;margin-bottom:1rem;">
        <div class="filter-chips" id="deptFilters">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="Makeup">Makeup</button>
          <button class="filter-chip" data-filter="Hair">Hair</button>
          <button class="filter-chip" data-filter="Nails">Nails</button>
          <button class="filter-chip" data-filter="Skincare">Skincare</button>
          <button class="filter-chip" data-filter="Lashes">Lashes</button>
          <button class="filter-chip" data-filter="Academy">Academy</button>
          <button class="filter-chip" data-filter="Operations">Operations</button>
        </div>
      </div>

      <!-- Staff grid -->
      <div id="staffGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;"></div>
    </div>
  </main>
</div>

<!-- STAFF MODAL -->
<div class="admin-modal-backdrop" id="staffModal">
  <div class="admin-modal" style="max-width:600px;">
    <div class="admin-modal-header">
      <h2 class="admin-modal-title" id="staffModalTitle">Add Staff Member</h2>
      <button class="admin-modal-close" onclick="closeModal('staffModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="admin-modal-body">
      <input type="hidden" id="staffId">
      <div style="display:grid;gap:1rem;">
        <div class="form-grid-2">
          <div><label class="admin-label">Full Name</label><input class="admin-input" id="staffName" placeholder="e.g. Grace Njeri"></div>
          <div><label class="admin-label">Role / Title</label><input class="admin-input" id="staffRole" placeholder="e.g. Senior Makeup Artist"></div>
        </div>
        <div class="form-grid-2">
          <div><label class="admin-label">Department</label>
            <select class="admin-select" id="staffDept">
              <option>Makeup</option><option>Hair</option><option>Nails</option>
              <option>Skincare</option><option>Lashes</option><option>Academy</option><option>Operations</option>
            </select>
          </div>
          <div><label class="admin-label">Status</label>
            <select class="admin-select" id="staffStatus"><option value="active">Active</option><option value="inactive">Inactive</option></select>
          </div>
        </div>
        <div><label class="admin-label">Profile Image Path</label><input class="admin-input" id="staffImage" placeholder="assets/images/lifestyle/team-01.webp"></div>
        <div><label class="admin-label">Bio</label><textarea class="admin-textarea" id="staffBio" placeholder="Short professional bio..."></textarea></div>
        <div><label class="admin-label">Skills (comma-separated)</label><input class="admin-input" id="staffSkills" placeholder="Bridal Makeup, Contouring, Editorial"></div>
      </div>
    </div>
    <div class="admin-modal-footer">
      <button class="btn-admin-outline" onclick="closeModal('staffModal')">Cancel</button>
      <button class="btn-admin-gold" onclick="saveStaff()">Save Staff</button>
    </div>
  </div>
</div>

<script src="../assets/js/admin.js"></script>
<script>
  let staffList = [];
  let dFilter = 'all';

  async function loadStaff() {
    staffList = await PB_ADMIN.getAll('staff');
    renderStaff();
  }

  function renderStaff() {
    const grid = document.getElementById('staffGrid');
    let list = dFilter === 'all' ? staffList : staffList.filter(s => s.department === dFilter);

    if (!list.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <h3>No staff members</h3><p>Add your first team member above.</p></div>`;
      return;
    }

    grid.innerHTML = list.map(s => {
      const skills = Array.isArray(s.skills) ? s.skills : (s.skills || '').split(',').map(x => x.trim()).filter(Boolean);
      return `
      <div class="staff-card">
        <div style="position:relative;">
          <img src="../${s.image}" alt="${s.name}" loading="lazy" style="width:100%;aspect-ratio:3/4;object-fit:cover;background:#F5F0EB;" onerror="this.style.display='none'">
          <span class="status-badge ${s.status === 'active' ? 'status-active' : 'status-inactive'}" style="position:absolute;top:8px;right:8px;">${s.status}</span>
        </div>
        <div class="staff-card-body">
          <p style="font-size:.625rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C9A96E;margin-bottom:.2rem;">${s.department}</p>
          <p style="font-size:1rem;font-weight:600;color:#0A0A0A;margin-bottom:.1rem;">${s.name}</p>
          <p style="font-size:.8125rem;color:#555;margin-bottom:.75rem;">${s.role}</p>
          ${skills.length ? `<div style="display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.75rem;">${skills.slice(0,3).map(sk => `<span style="font-size:.625rem;background:#F5F0EB;color:#555;padding:2px 8px;border-radius:10px;">${sk}</span>`).join('')}</div>` : ''}
          <div style="display:flex;gap:.375rem;padding-top:.5rem;border-top:1px solid #F5F0EB;">
            <button class="btn-icon" style="flex:1;width:auto;justify-content:center;" onclick="editStaff('${s.id}')">Edit</button>
            <button class="btn-icon" onclick="toggleStaffStatus('${s.id}')" title="Toggle active"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>
            <button class="btn-icon" onclick="deleteStaff('${s.id}')" style="color:#DC2626;border-color:#FECACA;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  async function editStaff(id) {
    const s = staffList.find(x => x.id === id); if (!s) return;
    document.getElementById('staffModalTitle').textContent = 'Edit Staff Member';
    document.getElementById('staffId').value = s.id;
    document.getElementById('staffName').value = s.name;
    document.getElementById('staffRole').value = s.role;
    document.getElementById('staffDept').value = s.department;
    document.getElementById('staffStatus').value = s.status;
    document.getElementById('staffImage').value = s.image;
    document.getElementById('staffBio').value = s.bio || '';
    const skills = Array.isArray(s.skills) ? s.skills.join(', ') : (s.skills || '');
    document.getElementById('staffSkills').value = skills;
    openModal('staffModal');
  }

  async function saveStaff() {
    const skillsRaw = document.getElementById('staffSkills').value;
    const item = {
      id: document.getElementById('staffId').value || undefined,
      name: document.getElementById('staffName').value.trim(),
      role: document.getElementById('staffRole').value.trim(),
      department: document.getElementById('staffDept').value,
      status: document.getElementById('staffStatus').value,
      image: document.getElementById('staffImage').value.trim(),
      bio: document.getElementById('staffBio').value.trim(),
      skills: skillsRaw.split(',').map(s => s.trim()).filter(Boolean)
    };
    if (!item.name) { adminToast('Name is required.', 'error'); return; }
    await PB_ADMIN.save('staff', item);
    staffList = await PB_ADMIN.getAll('staff');
    renderStaff();
    closeModal('staffModal');
    document.getElementById('staffId').value = '';
    document.getElementById('staffModalTitle').textContent = 'Add Staff Member';
    adminToast('Staff saved.', 'success');
  }

  async function toggleStaffStatus(id) {
    const s = staffList.find(x => x.id === id); if (!s) return;
    s.status = s.status === 'active' ? 'inactive' : 'active';
    await PB_ADMIN.save('staff', s);
    staffList = await PB_ADMIN.getAll('staff');
    renderStaff();
    adminToast(`${s.name} marked ${s.status}.`);
  }

  async function deleteStaff(id) {
    confirmDelete('Remove this staff member?', async () => {
      staffList = await PB_ADMIN.remove('staff', id);
      renderStaff();
      adminToast('Staff removed.', 'success');
    });
  }

  document.querySelectorAll('#deptFilters .filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#deptFilters .filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      dFilter = chip.dataset.filter;
      renderStaff();
    });
  });

  loadStaff();
</script>
</body>
